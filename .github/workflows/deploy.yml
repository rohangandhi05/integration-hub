name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/integration-hub

jobs:
  # ─── Test ──────────────────────────────────────────────────────────────────
  test-gateway:
    name: Test Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: gateway/package.json }
      - run: npm ci
        working-directory: gateway
      - run: node -e "require('./src/schema.js'); require('./src/auth.js'); console.log('imports ok')"
        working-directory: gateway

  test-transformer:
    name: Test Transformer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: |
          sudo apt-get install -y gnupg
          pip install xmltodict python-gnupg
        working-directory: transformer
      - run: python -c "from src.transform import transform_employee_xml_to_json, xml_to_dict; print('transform ok')"
        working-directory: transformer
      - name: Run transform unit test
        working-directory: transformer
        run: |
          python - <<'EOF'
          from src.transform import transform_employee_xml_to_json, validate_employee_payload

          xml = """<?xml version='1.0'?>
          <employee>
            <id>EMP001</id>
            <n>Alice Chen</n>
            <department>Engineering</department>
            <startDate>2022-03-01</startDate>
            <salary>115000</salary>
            <status>active</status>
          </employee>"""

          result = transform_employee_xml_to_json(xml, [])
          assert result["employeeId"] == "EMP001", f"Expected EMP001, got {result['employeeId']}"
          assert result["fullName"] == "Alice Chen"
          assert result["department"] == "ENGINEERING"
          assert result["baseSalary"] == 115000.0
          errors = validate_employee_payload(result)
          assert errors == [], f"Unexpected validation errors: {errors}"
          print("All transform tests passed")
          EOF

  test-mock-services:
    name: Test Mock Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Test mock-hr starts
        run: |
          cd mock-hr && npm ci && node -e "
            process.env.PORT = '3099';
            const app = require('./src/index.js');
          " &
          sleep 2
          curl -sf http://localhost:3099/health | grep -q 'mock-hr' && echo 'HR health ok'
          curl -sf http://localhost:3099/employees | grep -q 'EMP001' && echo 'HR employees ok'
        continue-on-error: true

  # ─── Build Docker images ───────────────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-gateway, test-transformer, test-mock-services]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [gateway, transformer, mock-hr, mock-payroll, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}

  # ─── Deploy to Azure Container Instances ──────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy gateway to ACI
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            az container create \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name integration-gateway \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gateway:${{ github.sha }} \
              --cpu 1 --memory 1 \
              --ports 3000 \
              --environment-variables \
                NODE_ENV=production \
                MOCK_HR_URL=http://mock-hr:3001 \
                MOCK_PAYROLL_URL=http://mock-payroll:3002 \
              --secure-environment-variables \
                DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                AZURE_SB_CONNECTION_STRING="${{ secrets.AZURE_SB_CONNECTION_STRING }}" \
                API_KEYS="${{ secrets.API_KEYS }}" \
                PGP_PASSPHRASE="${{ secrets.PGP_PASSPHRASE }}" \
              --registry-server ${{ env.REGISTRY }} \
              --registry-username ${{ github.actor }} \
              --registry-password ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy transformer to ACI
        uses: azure/cli@v1
        with:
          azcliversion: latest
          inlineScript: |
            az container create \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --name integration-transformer \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-transformer:${{ github.sha }} \
              --cpu 1 --memory 1 \
              --ports 8000 \
              --secure-environment-variables \
                DATABASE_URL="${{ secrets.DATABASE_URL }}" \
                AZURE_SB_CONNECTION_STRING="${{ secrets.AZURE_SB_CONNECTION_STRING }}" \
                PGP_PASSPHRASE="${{ secrets.PGP_PASSPHRASE }}" \

      - name: Print deployment summary
        run: |
          echo "Deployed commit ${{ github.sha }}"
          echo "Gateway: https://integration-gateway.<region>.azurecontainer.io:3000"
